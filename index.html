<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriCalc - Saúde na Palma da Mão</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>NutriCalc 🍎</h1>
        <p>Use nossa calculadora para entender melhor seu corpo.</p>

        <form id="calc-form">
            <div class="input-group">
                <label for="peso">Peso (kg):</label>
                <input type="number" id="peso" placeholder="Digite seu Peso - Ex.: 80" step="0.1">

                <label for="altura">Altura (cm):</label>
                <input type="number" id="altura" placeholder="Digite sua Altura- Ex.: 170">

                <label for="idade">Idade:</label>
                <input type="number" id="idade" placeholder="Digite sua Idade- Ex.:28">

                <label for="genero">Gênero:</label>
                
                <select id="genero" name="genero">
                    <option value="">Selecione...</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="nao-binario">Não-binário</option>
                    <option value="prefiro-nao-dizer">Prefiro não dizer</option>
                </select>
            </div>

            <button type="button" onclick="calcular()">Calcular Resultados</button>
        </form>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analisando seus Dados Nutricionais.....</p>
        </div>

        <div id="resultado" class="hidden">
            <h3>📊 Seu Relatório:</h3>
            <p id="res-imc"></p>
            <p id="res-tmb"></p>
            <p id="res-agua"></p>
            <p id="res-ideal"></p>

            <button type="button" class="btn-limpar" onclick="limparCampos()">Novo Cálculo</button>
            <hr>
            <small>*Dados baseados em fórmulas da OMS e Harris-Benedict.</small>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
